<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a1b26">
  <title>M&R Split</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Setup notice (shown until firebase-config.js is filled in) -->
  <div id="setup-view" class="view hidden">
    <div class="login-box">
      <div class="login-logo">🛠️</div>
      <h1>Almost there</h1>
      <p class="muted">Firebase isn't configured yet.<br>
      Follow <b>SETUP.md</b> in the repo, paste your config into
      <b>firebase-config.js</b> and push.</p>
    </div>
  </div>

  <!-- Login view -->
  <div id="login-view" class="view hidden">
    <div class="login-box">
      <div class="login-logo">💜</div>
      <h1>Marta &amp; Rafał</h1>
      <p class="muted">Who are you?</p>
      <div class="user-pick">
        <button class="user-btn" data-user="Marta">Marta</button>
        <button class="user-btn" data-user="Rafał">Rafał</button>
      </div>
      <input id="pin-input" type="password" placeholder="Password" autocomplete="current-password">
      <button id="login-btn" class="primary">Log in</button>
      <p id="login-error" class="error hidden"></p>
    </div>
  </div>

  <!-- Main view -->
  <div id="main-view" class="view hidden">
    <header>
      <span id="hello"></span>
      <button id="logout-btn" class="ghost">Log out</button>
    </header>

    <div id="balance-banner"></div>

    <nav class="tabs">
      <button class="tab active" data-tab="add">➕ Add</button>
      <button class="tab" data-tab="history">📜 History</button>
    </nav>

    <section id="tab-add" class="tab-panel">
      <form id="expense-form">
        <button type="button" id="scan-btn" class="scan">📷 Scan receipt</button>
        <input id="scan-file" type="file" accept="image/*" capture="environment" class="hidden">
        <p id="scan-status" class="muted small-text hidden"></p>

        <input id="f-desc" type="text" placeholder="What was it? (e.g. Biedronka)" maxlength="200" required>
        <div class="row">
          <input id="f-amount" type="text" inputmode="decimal" placeholder="0.00" required>
          <select id="f-currency">
            <option>PLN</option><option>EUR</option><option>USD</option>
            <option>GBP</option><option>CZK</option><option>HUF</option>
          </select>
        </div>
        <label class="field-label">Paid by</label>
        <div class="row toggle-row" id="f-paidby">
          <button type="button" class="toggle" data-val="Marta">Marta</button>
          <button type="button" class="toggle" data-val="Rafał">Rafał</button>
        </div>
        <label class="field-label">Category</label>
        <div class="chips" id="f-category">
          <button type="button" class="chip active" data-val="Groceries">🛒 Groceries</button>
          <button type="button" class="chip" data-val="Food">🍕 Food</button>
          <button type="button" class="chip" data-val="Travel">✈️ Travel</button>
          <button type="button" class="chip" data-val="Transport">🚌 Transport</button>
          <button type="button" class="chip" data-val="Home">🏠 Home</button>
          <button type="button" class="chip" data-val="Fun">🎉 Fun</button>
          <button type="button" class="chip" data-val="Other">📦 Other</button>
        </div>
        <label class="field-label">Split</label>
        <div class="row toggle-row" id="f-split">
          <button type="button" class="toggle active" data-val="half">50 / 50</button>
          <button type="button" class="toggle" data-val="full">All on the other</button>
          <button type="button" class="toggle" data-val="custom">Custom</button>
        </div>
        <div id="custom-split" class="row hidden">
          <div class="share-field">
            <label>Marta's share</label>
            <input id="f-share-marta" type="text" inputmode="decimal" placeholder="0.00">
          </div>
          <div class="share-field">
            <label>Rafał's share</label>
            <input id="f-share-rafal" type="text" inputmode="decimal" placeholder="0.00">
          </div>
        </div>
        <div class="row">
          <input id="f-date" type="date">
        </div>
        <button type="submit" class="primary">Add expense</button>
        <p id="form-error" class="error hidden"></p>
      </form>
    </section>

    <section id="tab-history" class="tab-panel hidden">
      <div id="history-list"></div>
    </section>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
