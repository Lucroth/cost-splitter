<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a1b26">
  <title>M&R Split</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Setup notice (shown until firebase-config.js is filled in) -->
  <div id="setup-view" class="view hidden">
    <div class="login-box">
      <div class="login-logo">🛠️</div>
      <h1>Prawie gotowe</h1>
      <p class="muted">Firebase nie jest jeszcze skonfigurowany.<br>
      Wykonaj kroki z <b>SETUP.md</b>, wklej konfigurację do
      <b>firebase-config.js</b> i wypchnij zmiany.</p>
    </div>
  </div>

  <!-- Login view -->
  <div id="login-view" class="view hidden">
    <div class="login-box">
      <div class="login-logo">💜</div>
      <h1>Marta &amp; Rafał</h1>
      <p class="muted">Kim jesteś?</p>
      <div class="user-pick">
        <button class="user-btn" data-user="Marta">Marta</button>
        <button class="user-btn" data-user="Rafał">Rafał</button>
      </div>
      <input id="pin-input" type="password" placeholder="Hasło" autocomplete="current-password">
      <button id="login-btn" class="primary">Zaloguj się</button>
      <p id="login-error" class="error hidden"></p>
    </div>
  </div>

  <!-- Main view -->
  <div id="main-view" class="view hidden">
    <header>
      <span id="hello"></span>
      <button id="logout-btn" class="ghost">Wyloguj</button>
    </header>

    <div id="balance-banner"></div>

    <nav class="tabs">
      <button class="tab" data-tab="add">➕ Dodaj</button>
      <button class="tab active" data-tab="history">📜 Historia</button>
    </nav>

    <section id="tab-add" class="tab-panel hidden">
      <form id="expense-form">
        <button type="button" id="scan-btn" class="scan">📷 Skanuj paragon</button>
        <input id="scan-file" type="file" accept="image/*" capture="environment" class="hidden">
        <p id="scan-status" class="muted small-text hidden"></p>

        <input id="f-desc" type="text" placeholder="Co to było? (np. Biedronka)" maxlength="200" required>
        <input id="f-amount" type="text" inputmode="decimal" placeholder="0,00 zł" required>
        <input id="f-date" type="date">
        <button type="submit" class="primary">Dodaj wydatek</button>
        <p id="form-error" class="error hidden"></p>
      </form>
    </section>

    <section id="tab-history" class="tab-panel">
      <div id="history-list"></div>
    </section>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
